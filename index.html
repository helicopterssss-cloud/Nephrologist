<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腎臟科醫師專用系統</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: "Microsoft JhengHei", sans-serif; 
            overflow: hidden; /* 隱藏最外層捲軸，由 iframe 內部自行滾動 */
        }
        .sidebar { 
            height: 100vh; 
            background: #2c3e50; 
            color: white; 
            padding-top: 20px; 
            position: fixed; 
            z-index: 100;
        }
        .sidebar a { 
            color: #bdc3c7; 
            display: block; 
            padding: 15px 20px; 
            text-decoration: none; 
            font-size: 1.1em; 
            transition: 0.2s;
        }
        .sidebar a:hover, .sidebar a:focus { 
            background: #34495e; 
            color: white; 
            border-left: 4px solid #007bff; 
        }
        .main-content { 
            margin-left: 16.666667%; /* 對應 col-md-2 的寬度 */
            padding: 0; /* 清除預設 padding 讓 iframe 滿版 */
            height: 100vh; 
        }
        /* iframe 樣式設定為滿版且無邊框 */
        #main-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="sidebar-sticky">
                <h4 class="text-center mt-2 mb-3 font-weight-bold">腎臟科系統</h4>
                <hr class="bg-secondary">
                <a href="排版程式.html" target="main-frame">📝 排版程式</a>
                <a href="Test.htm" target="main-frame">🏥 門診</a>
                <a href="Present illness.htm" target="main-frame">🛏️ 住院</a>
                <a href="consult.htm" target="main-frame">🤝 會診</a>
                <a href="屏基echo.htm" target="main-frame">🩺 腎超 (屏基 Echo)</a>
            </div>
        </nav>

        <main role="main" class="col-md-10 main-content">
            <iframe name="main-frame" id="main-frame" src="about:blank" title="主顯示區域"></iframe>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
