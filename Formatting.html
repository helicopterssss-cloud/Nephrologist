<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>йҶ«еӯёе ұе‘ҠжҺ’зүҲеҠ©жүӢ 2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { @apply px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all shadow-sm text-sm font-medium active:scale-95; }
        .btn-secondary { @apply px-4 py-2 bg-white text-gray-700 rounded-lg hover:bg-gray-100 transition-all shadow-sm text-sm border border-gray-300 active:scale-95; }
        .btn-medical { @apply px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-all shadow-sm text-sm font-medium active:scale-95; }
        .btn-danger { @apply px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-all shadow-sm text-sm border border-red-200 active:scale-95; }
        .btn-orange { @apply px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition-all shadow-sm text-sm font-medium active:scale-95; }
        .btn-control { @apply px-3 py-1 bg-slate-700 text-white text-xs rounded hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all; }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">йҶ«еӯёе ұе‘ҠжҺ’зүҲеҠ©жүӢ <span class="text-blue-600">2.5</span></h1>
                <p class="text-slate-500 text-sm mt-1">е°ҲзӮәиҮЁеәҠйҶ«её«иЁӯиЁҲзҡ„ж–Үеӯ—иҷ•зҗҶе·Ҙе…·</p>
            </div>
            <div class="flex gap-2">
                <button id="copyBtn" onclick="copyToClipboard()" class="btn-action flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    иӨҮиЈҪзөҗжһң
                </button>
                <button onclick="clearText()" class="btn-danger">жё…йҷӨе…§е®№</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 xl:col-span-3 space-y-6">
                
                <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> иҮЁеәҠж•ҙзҗҶ
                    </h2>
                    <div class="flex flex-col gap-3">
                        <button onclick="Lab()" class="btn-medical w-full">Lab ж•ёж“ҡи¶ЁеӢўеҢ– (еҸҜжҢҮе®ҡй …зӣ®)</button>
                        <button onclick="removeXray()" class="btn-medical w-full bg-indigo-600 hover:bg-indigo-700">X-Ray е ұе‘ҠеҺ»йӣңиЁҠ</button>
                        <button onclick="spaceToArrow()" class="btn-orange w-full">з©әж јиҪүз®ӯй ӯ (вҶ’)</button>
                        <button onclick="addNumbering()" class="btn-orange w-full bg-orange-600">иЎҢйҰ–дҫқеәҸеҠ ж•ёеӯ—</button>
                    </div>
                </section>

                <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> йҖҡз”ЁжҺ’зүҲ
                    </h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="myFunction()" class="btn-secondary">еҲӘеҲҶйҡ”з·ҡ</button>
                        <button onclick="impactFun()" class="btn-secondary">еЈ“зё®з©әзҷҪ</button>
                        <button onclick="impactlineFun()" class="btn-secondary">еЈ“зё®з©әиЎҢ</button>
                        <button onclick="RemoveNewline()" class="btn-secondary">з§»йҷӨжҸӣиЎҢ</button>
                        <button onclick="dotFun()" class="btn-secondary">иЎҢйҰ–еҠ  .</button>
                        <button onclick="arrFun()" class="btn-secondary">иЎҢйҰ–еҠ  ></button>
                        <button onclick="FirstCharFun()" class="btn-secondary">еҲӘйҰ–еӯ—</button>
                        <button onclick="LastCharFun()" class="btn-secondary">еҲӘе°ҫеӯ—</button>
                    </div>
                    <button onclick="CapFun()" class="w-full btn-secondary mt-3">йҰ–еӯ—еӨ§еҜ«/е…¶йӨҳе°ҸеҜ«</button>
                </section>

                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <h3 class="text-xs font-bold text-blue-700 mb-2">рҹ’Ў е°Ҹж’ҮжӯҘ</h3>
                    <p class="text-[11px] text-blue-600 leading-relaxed">
                        й»һж“Ҡ Lab ж•ёж“ҡеҢ–еҫҢијёе…Ҙ <b>P</b> еҚіеҸҜеҸӘжҸҗеҸ–зЈ·йӣўеӯҗж•ёж“ҡгҖӮијёе…ҘеӨҡеҖӢи«Ӣз”ЁйҖ—иҷҹйҡ”й–ӢгҖӮ
                    </p>
                </div>
            </div>

            <div class="lg:col-span-8 xl:col-span-9">
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <div class="bg-slate-800 px-4 py-2 flex justify-between items-center text-slate-400">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-mono text-white/70 mr-2">EDITOR</span>
                            <button onclick="undo()" id="undoBtn" class="btn-control" title="еҫ©еҺҹ">вҶ© еҫ©еҺҹ</button>
                            <button onclick="redo()" id="redoBtn" class="btn-control" title="йҮҚдҪң">вҶӘ йҮҚдҪң</button>
                            <button onclick="insertCurrentDate()" class="text-[10px] bg-slate-700 hover:bg-blue-600 text-white px-2 py-0.5 rounded transition-colors border border-slate-600 ml-2">
                                рҹ“… жҸ’е…Ҙд»Ҡж—Ҙпјҡ<span id="displayDate"></span>
                            </button>
                        </div>
                        <span id="charCount" class="text-xs">0 еӯ—е…ғ</span>
                    </div>
                    <textarea id="inputtext" 
                        class="w-full p-6 h-[700px] focus:outline-none font-mono text-sm leading-relaxed bg-white"
                        placeholder="еңЁжӯӨиІјдёҠиҮЁеәҠе ұе‘Ҡе…§е®№..."
                        oninput="saveState(); updateCharCount();"
                        onkeydown="handleKeyDown(event)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('inputtext');
        let history = [''];
        let historyStep = 0;

        function saveState() {
            if (textarea.value === history[historyStep]) return;
            history = history.slice(0, historyStep + 1);
            history.push(textarea.value);
            historyStep++;
            updateUndoRedoButtons();
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                textarea.value = history[historyStep];
                updateUndoRedoButtons();
                updateCharCount();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                textarea.value = history[historyStep];
                updateUndoRedoButtons();
                updateCharCount();
            }
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = historyStep === 0;
            document.getElementById('redoBtn').disabled = historyStep === history.length - 1;
        }

        function updateDisplayDate() {
            const d = new Date();
            const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
            document.getElementById('displayDate').innerText = dateStr;
        }
        updateDisplayDate();

        function insertCurrentDate() {
            const d = new Date();
            const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            textarea.value = textarea.value.substring(0, start) + dateStr + textarea.value.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + dateStr.length;
            saveState();
            updateCharCount();
        }

        function updateCharCount() {
            document.getElementById('charCount').innerText = textarea.value.length + " еӯ—е…ғ";
        }

        function clearText() {
            if(confirm('зўәе®ҡиҰҒжё…йҷӨжүҖжңүе…§е®№е—Һпјҹ')) {
                textarea.value = '';
                saveState();
                updateCharCount();
            }
        }

        async function copyToClipboard() {
            const content = textarea.value;
            if (!content) return;
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            try {
                await navigator.clipboard.writeText(content);
                btn.innerHTML = 'вң… е·ІиӨҮиЈҪпјҒ';
                btn.classList.add('bg-green-600');
            } catch (err) {
                textarea.select();
                document.execCommand('copy');
                btn.innerHTML = 'вң… е·ІиӨҮиЈҪпјҒ';
            }
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
            }, 2000);
        }

        // --- ж ёеҝғйӮҸијҜеҚҖ ---

        function Lab() {
            const fullLabMap = [
                { key: "WBC", nick: "WBC" },
                { key: "Hb", nick: "Hb" },
                { key: "Platelet", nick: "PLT" },
                { key: "Glucose finger AC", nick: "Glu-AC" },
                { key: "BUN", nick: "BUN" },
                { key: "Cr", nick: "Cr" },
                { key: "Na", nick: "Na" },
                { key: "K", nick: "K" },
                { key: "Ca", nick: "Ca" },
                { key: "P", nick: "P" },
                { key: "ALT", nick: "ALT" },
                { key: "AST", nick: "AST" },
                { key: "Albumin(BCG)", nick: "Alb" },
                { key: "HbA1C", nick: "A1c" },
                { key: "UPCR", nick: "UPCR" },
                { key: "UACR", nick: "UACR" }
            ];

            const targetInput = prompt("и«Ӣијёе…ҘиҰҒжҢҮе®ҡзҡ„ Lab й …зӣ® (дҫӢеҰӮ: P) жҲ–з•ҷз©әд»ҘйЎҜзӨәе…ЁйғЁ", "");
            if (targetInput === null) return;

            // и§ЈжһҗдҪҝз”ЁиҖ…ијёе…ҘпјҢж”ҜжҸҙйҖ—иҷҹеҲҶйҡ”
            const targetList = targetInput.trim() === "" ? [] : targetInput.split(',').map(s => s.trim().toLowerCase());

            const labMap = targetList.length === 0 
                ? fullLabMap 
                : fullLabMap.filter(item => targetList.includes(item.key.toLowerCase()) || targetList.includes(item.nick.toLowerCase()));

            const lines = textarea.value.split('\n');
            let dataMap = {};

            lines.forEach(line => {
                const trimmedLine = line.trim();
                for (let lab of labMap) {
                    // дҪҝз”ЁжӯЈеүҮиЎЁйҒ”ејҸзІҫзўәеҢ№й…ҚиЎҢйҰ–зҡ„й …зӣ®еҗҚзЁұпјҢйҒҝе…Қ P жҠ“еҲ° Platelet
                    const escapedKey = lab.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp("^" + escapedKey + "(\\s|\\t|$)");
                    
                    if (regex.test(trimmedLine)) {
                        let content = trimmedLine.substring(lab.key.length).trim();
                        // еҢ№й…Қж•ёеӯ—
                        let matches = content.match(/(\d+(\.\d+)?)/g);
                        if (matches) {
                            dataMap[lab.key] = `${lab.nick}: ${matches.join(' -> ')}`;
                        }
                    }
                }
            });

            let finalOutput = [];
            labMap.forEach(lab => {
                if (dataMap[lab.key]) finalOutput.push(dataMap[lab.key]);
            });

            if (finalOutput.length > 0) {
                textarea.value = finalOutput.join('\n');
            } else {
                alert("жңӘеҒөжё¬еҲ°жҢҮе®ҡзҡ„ж•ёж“ҡй …зӣ®гҖӮ");
            }
            saveState();
            updateCharCount();
        }

        function removeXray() {
            let str = textarea.value.replace(/\n/g, "@@");
            str = str.replace(/е§“еҗҚпјҡ(.*?)ж”¶д»¶жҷӮй–“пјҡ/mg, "");
            str = str.replace(/й–Ӣе–®з§‘еҲҘпјҡ(.*?)е ұе‘Ҡе…§е®№пјһ/mg, "");
            str = str.replace(/пјңжӘўжҹҘзӣ®зҡ„еҸҠз—…зЁӢж‘ҳиҰҒпјһ(.*?)пјңPпјһ/mg, "");
            str = str.replace(/пјңAпјһ(.*?)пјңPпјһ/mg, "");
            str = str.replace(/@@/g, "\n");
            const filters = ["ж”¶д»¶иҷҹ", "еәҠиҷҹпјҡ", "ж”ҫе°„её«пјҡ"];
            textarea.value = str.split('\n').filter(line => !filters.some(f => line.includes(f))).join('\n');
            impactlineFun();
            saveState();
        }

        function spaceToArrow() {
            textarea.value = textarea.value.replace(/ +/g, ' -> ');
            saveState();
            updateCharCount();
        }

        function addNumbering() {
            const lines = textarea.value.split('\n');
            let count = 1;
            textarea.value = lines.map(line => line.trim() ? `${count++}. ${line}` : line).join('\n');
            saveState();
            updateCharCount();
        }

        function myFunction() {
            textarea.value = textarea.value.split('\n').map(line => line.includes('----------------') ? '' : line).join('\n');
            saveState();
        }

        function impactFun() {
            textarea.value = textarea.value.split('\n').map(line => line.replace(/ +(?= )/g, '')).join('\n');
            saveState();
        }

        function impactlineFun() {
            textarea.value = textarea.value.replace(/\n\s*\n/g, '\n');
            saveState();
        }

        function FirstCharFun() {
            textarea.value = textarea.value.split('\n').map(line => line.length > 0 ? line.slice(1) : line).join('\n');
            saveState();
        }

        function LastCharFun() {
            textarea.value = textarea.value.split('\n').map(line => line.length > 0 ? line.slice(0, -1) : line).join('\n');
            saveState();
        }

        function dotFun() {
            textarea.value = textarea.value.split('\n').map(line => line.trim() ? '.' + line : line).join('\n');
            saveState();
        }

        function arrFun() {
            textarea.value = textarea.value.split('\n').map(line => line.trim() ? '>' + line : line).join('\n');
            saveState();
        }

        function CapFun() {
            const val = textarea.value;
            if (!val) return;
            textarea.value = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            saveState();
        }

        function RemoveNewline() {
            textarea.value = textarea.value.replace(/\r?\n|\r/g, " ");
            saveState();
        }

        function handleKeyDown(e) {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
            if (e.altKey) {
                e.preventDefault();
                const lines = textarea.value.split('\n');
                textarea.value = e.shiftKey ? 
                    lines.map(line => line.startsWith('   ') ? line.substring(3) : line.trimStart()).join('\n') :
                    lines.map(line => '   ' + line).join('\n');
                saveState();
            }
            updateCharCount();
        }
        updateUndoRedoButtons();
    </script>
</body>
</html>
